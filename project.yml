name: NotePanel
options:
  bundleIdPrefix: com.notepanel
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/MarkdownUI
    from: 2.4.1

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  NotePanel:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Models
      - path: Views
      - path: Utilities
      - path: AppDelegate.swift
      - path: NotePanelApp.swift
    dependencies:
      - package: MarkdownUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notepanel.app
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: NotePanel.entitlements
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: NotePanel.entitlements

schemes:
  NotePanel:
    build:
      targets:
        NotePanel: all
    run:
      config: Debug
